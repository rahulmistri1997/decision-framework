<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decision Framework</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2334d399' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolygon points='13 2 3 14 12 14 11 22 21 10 12 10 13 2'/%3E%3C/svg%3E" type="image/svg+xml">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="O(1) Engine">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-top-2 { from { transform: translateY(-0.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slide-in-from-bottom-4 { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .animate-in { animation-duration: 0.4s; animation-fill-mode: both; }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-top-2 { animation-name: slide-in-from-top-2; }
        .slide-in-from-bottom-4 { animation-name: slide-in-from-bottom-4; }
        .duration-300 { animation-duration: 300ms; }
        .duration-500 { animation-duration: 500ms; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        body { background-color: #020617; color: #e2e8f0; scroll-behavior: smooth; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-emerald-500/30 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Inline Icons ---
        const Icon = ({ size = 24, className = '', children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const History = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
        const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const AlertTriangle = (p) => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></Icon>;
        const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
        const Terminal = (p) => <Icon {...p}><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></Icon>;
        const GitBranch = (p) => <Icon {...p}><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>;
        const Copy = (p) => <Icon {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Icon>;
        const Activity = (p) => <Icon {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;

        // --- Core Components ---

        const ChoiceBtn = ({ children, onClick }) => (
            <button 
                onClick={onClick} 
                className="bg-slate-900 border border-slate-800 hover:border-emerald-500/50 hover:bg-emerald-500/5 hover:text-emerald-400 text-slate-300 transition-all rounded-lg p-3 text-sm font-medium text-left w-full flex items-center justify-between group"
            >
                <span>{children}</span>
                <span className="text-emerald-500 opacity-0 group-hover:opacity-100 transition-opacity font-mono text-xs">➔</span>
            </button>
        );

        const PathNode = ({ title, icon: IconComponent, isActive, isCompleted, isLast, onEdit, children, completedText }) => {
            const isFuture = !isActive && !isCompleted;
            
            return (
                <div className={`relative pl-8 sm:pl-10 pb-8 transition-all duration-500 ${isFuture ? 'opacity-30 grayscale pointer-events-none' : 'opacity-100'}`}>
                    
                    {/* Vertical connecting line */}
                    {!isLast && (
                        <div className={`absolute left-[7px] top-8 bottom-0 w-[2px] transition-colors duration-500 ${isCompleted ? 'bg-emerald-500/30' : 'bg-slate-800'}`}></div>
                    )}
                    
                    {/* The Node Marker */}
                    <div className={`absolute left-0 top-1 w-4 h-4 rounded-full flex items-center justify-center transition-all duration-500 z-10
                        ${isActive ? 'bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.4)] scale-110' : 
                          isCompleted ? 'bg-emerald-500' : 
                          'bg-slate-950 border-2 border-slate-700'}`}
                    >
                        {isCompleted && <Check size={10} className="text-slate-950" />}
                    </div>

                    <div className="w-full">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className={`text-sm font-bold uppercase tracking-wider flex items-center gap-2 
                                ${isActive ? 'text-emerald-400' : isCompleted ? 'text-slate-400' : 'text-slate-600'}`}>
                                <IconComponent size={16} /> {title}
                            </h3>
                            {isCompleted && onEdit && !isActive && (
                                <button onClick={onEdit} className="text-[10px] font-mono text-slate-500 hover:text-emerald-400 transition-colors">
                                    [EDIT]
                                </button>
                            )}
                        </div>
                        
                        {isActive && (
                            <div className="animate-in fade-in slide-in-from-top-2 duration-300 w-full">
                                {children}
                            </div>
                        )}
                        
                        {isCompleted && !isActive && (
                            <div className="animate-in fade-in duration-300 font-mono text-xs text-slate-300 flex items-center gap-2 bg-slate-900/50 border border-slate-800/50 p-2.5 rounded-lg w-fit">
                                <span className="text-emerald-500/50">➔</span> {completedText}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            
            const [decisionContext, setDecisionContext] = useState('');
            const [decisionTarget, setDecisionTarget] = useState('');
            
            const [impact10Min, setImpact10Min] = useState(null);
            const [impact10Mo, setImpact10Mo] = useState(null);
            const [impact10Yr, setImpact10Yr] = useState(null);
            const [isReversible, setIsReversible] = useState(null);
            
            const [generationTime, setGenerationTime] = useState('');
            
            const resultRef = useRef(null);
            const [exportState, setExportState] = useState({ type: null, status: 'idle' });

            // Auto-scroll logic when moving to a new step
            const containerRef = useRef(null);
            useEffect(() => {
                if (currentStep > 0 && containerRef.current) {
                    // Small delay ensures DOM updates first
                    setTimeout(() => {
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 100);
                }
            }, [currentStep]);

            const resetFromStep = (step) => {
                setCurrentStep(step);
                if (step <= 0) { setDecisionTarget(''); }
                if (step <= 1) { setImpact10Min(null); }
                if (step <= 2) { setImpact10Mo(null); }
                if (step <= 3) { setImpact10Yr(null); }
                if (step <= 4) { setIsReversible(null); }
            };

            const handleFinalize = (reversible) => {
                setIsReversible(reversible);
                const now = new Date();
                setGenerationTime(now.toLocaleString(undefined, {
                    timeZoneName: 'short', year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                }).toUpperCase());
                setCurrentStep(5);
            };

            const calculateStakes = () => {
                let stakes = 0; 
                if (impact10Mo === 0 && impact10Yr === 0) stakes = 0;
                else if (impact10Yr === 2 || impact10Mo === 2) stakes = 2;
                else stakes = 1;

                if (isReversible === true && stakes > 0) stakes -= 1;
                else if (isReversible === false && stakes === 0 && impact10Mo > 0) stakes = 1;

                return stakes;
            };

            const captureImage = async () => {
                if (!resultRef.current || !window.html2canvas) return null;
                const canvas = await window.html2canvas(resultRef.current, { 
                    backgroundColor: '#020617',
                    scale: 3, 
                    useCORS: true,
                    allowTaint: true,
                    scrollY: -window.scrollY 
                });
                return canvas;
            };

            const handleDownloadImage = async () => {
                setExportState({ type: 'download', status: 'loading' });
                try {
                    const canvas = await captureImage();
                    const link = document.createElement('a');
                    link.download = `heuristic-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    setExportState({ type: 'download', status: 'success' });
                    setTimeout(() => setExportState({ type: null, status: 'idle' }), 2000);
                } catch (err) {
                    setExportState({ type: 'download', status: 'error' });
                    setTimeout(() => setExportState({ type: null, status: 'idle' }), 3000);
                }
            };

            const handleCopyImage = async () => {
                setExportState({ type: 'copy', status: 'loading' });
                try {
                    const canvas = await captureImage();
                    canvas.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                            setExportState({ type: 'copy', status: 'success' });
                            setTimeout(() => setExportState({ type: null, status: 'idle' }), 2000);
                        } catch (err) {
                            setExportState({ type: 'copy', status: 'error' });
                            setTimeout(() => setExportState({ type: null, status: 'idle' }), 4000);
                        }
                    }, 'image/png');
                } catch (err) {
                    setExportState({ type: 'copy', status: 'error' });
                    setTimeout(() => setExportState({ type: null, status: 'idle' }), 4000);
                }
            };

            // Calculated Outputs
            const stakes = calculateStakes();
            const config = {
                0: { title: "LOW STAKES", color: "text-emerald-400", bg: "bg-emerald-500/10", border: "border-emerald-500/30", ttl: "15 Minutes", options: "Max 2", algorithm: "Coin Flip / First-Found", rule: "Execution speed > perfection. Choose the first viable option and move on immediately. Satisficing is an optimization." },
                1: { title: "MEDIUM STAKES", color: "text-amber-400", bg: "bg-amber-500/10", border: "border-amber-500/30", ttl: "2 Hours", options: "3 to 4", algorithm: "Satisficing (Criteria)", rule: "Define 3-4 'Must-Have' criteria. Buy/Book the FIRST option that hits all marks. Stop searching immediately upon hit." },
                2: { title: "HIGH STAKES", color: "text-red-400", bg: "bg-red-500/10", border: "border-red-500/30", ttl: "7 Days (Hard)", options: "Top 5 Only", algorithm: "Default Action Fallback", rule: "Define a 'Good Enough' fallback on Day 1. If 7-day timeout hits without a perfect breakthrough, execute the fallback instantly." }
            }[stakes];

            const l_10m = {0: 'None', 1: 'Noticeable', 2: 'Intense'}[impact10Min] || '';
            const l_10mo = {0: 'Forgotten', 1: 'Minor', 2: 'Major'}[impact10Mo] || '';
            const l_10yr = {0: 'Zero', 1: 'Minimal', 2: 'Altering'}[impact10Yr] || '';
            const l_door = isReversible === true ? 'Two-Way Door' : isReversible === false ? 'One-Way Door' : '';

            return (
                <div className="min-h-[100dvh] w-full flex justify-center bg-slate-950 text-slate-200 font-sans selection:bg-emerald-500/30">
                    <div className="w-full max-w-md flex flex-col pt-[max(env(safe-area-inset-top),3rem)] px-6 pb-12" ref={containerRef}>
                        
                        {/* Title Minimal Header */}
                        <header className="mb-10 text-left border-b border-slate-800 pb-4">
                            <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                <Zap size={18} className="text-emerald-400" />
                                O(1) Routing Engine
                            </h1>
                            <p className="text-slate-500 font-mono text-[10px] uppercase tracking-wider mt-1">
                                Decision Framework v2.0
                            </p>
                        </header>

                        {/* Interactive Timeline Graph */}
                        <main className="w-full">
                            
                            {/* Step 0: Target */}
                            <PathNode title="Decision Target" icon={Terminal} isActive={currentStep === 0} isCompleted={currentStep > 0} onEdit={() => resetFromStep(0)} completedText={decisionTarget}>
                                <div className="flex gap-2 w-full">
                                    <input 
                                        type="text" 
                                        placeholder="e.g., Which framework to use..."
                                        className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-emerald-500 transition-colors text-sm w-full min-w-0"
                                        value={decisionContext}
                                        onChange={(e) => setDecisionContext(e.target.value)}
                                        onKeyDown={(e) => { if(e.key === 'Enter' && decisionContext.trim()) { setDecisionTarget(decisionContext); setCurrentStep(1); } }}
                                    />
                                    <button 
                                        disabled={!decisionContext.trim()}
                                        onClick={() => { setDecisionTarget(decisionContext); setCurrentStep(1); }}
                                        className="bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-800 disabled:text-slate-600 text-white p-3 rounded-lg transition-colors flex-shrink-0"
                                    >
                                        <ArrowRight size={18} />
                                    </button>
                                </div>
                            </PathNode>

                            {/* Step 1: 10 Min */}
                            <PathNode title="10 Minute Horizon" icon={Clock} isActive={currentStep === 1} isCompleted={currentStep > 1} onEdit={() => resetFromStep(1)} completedText={l_10m}>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 w-full">
                                    <ChoiceBtn onClick={() => { setImpact10Min(0); setCurrentStep(2); }}>None</ChoiceBtn>
                                    <ChoiceBtn onClick={() => { setImpact10Min(1); setCurrentStep(2); }}>Noticeable</ChoiceBtn>
                                    <ChoiceBtn onClick={() => { setImpact10Min(2); setCurrentStep(2); }}>Intense</ChoiceBtn>
                                </div>
                            </PathNode>

                            {/* Step 2: 10 Months */}
                            <PathNode title="10 Month Horizon" icon={Calendar} isActive={currentStep === 2} isCompleted={currentStep > 2} onEdit={() => resetFromStep(2)} completedText={l_10mo}>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 w-full">
                                    <ChoiceBtn onClick={() => { setImpact10Mo(0); setCurrentStep(3); }}>Forgotten</ChoiceBtn>
                                    <ChoiceBtn onClick={() => { setImpact10Mo(1); setCurrentStep(3); }}>Minor</ChoiceBtn>
                                    <ChoiceBtn onClick={() => { setImpact10Mo(2); setCurrentStep(3); }}>Major</ChoiceBtn>
                                </div>
                            </PathNode>

                            {/* Step 3: 10 Years */}
                            <PathNode title="10 Year Horizon" icon={History} isActive={currentStep === 3} isCompleted={currentStep > 3} onEdit={() => resetFromStep(3)} completedText={l_10yr}>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 w-full">
                                    <ChoiceBtn onClick={() => { setImpact10Yr(0); setCurrentStep(4); }}>Zero</ChoiceBtn>
                                    <ChoiceBtn onClick={() => { setImpact10Yr(1); setCurrentStep(4); }}>Minimal</ChoiceBtn>
                                    <ChoiceBtn onClick={() => { setImpact10Yr(2); setCurrentStep(4); }}>Altering</ChoiceBtn>
                                </div>
                            </PathNode>

                            {/* Step 4: Reversibility */}
                            <PathNode title="Circuit Breaker" icon={GitBranch} isActive={currentStep === 4} isCompleted={currentStep > 4} onEdit={() => resetFromStep(4)} completedText={l_door}>
                                <div className="grid grid-cols-1 gap-2 w-full">
                                    <ChoiceBtn onClick={() => handleFinalize(true)}>Two-Way Door (Reversible)</ChoiceBtn>
                                    <ChoiceBtn onClick={() => handleFinalize(false)}>One-Way Door (Irreversible)</ChoiceBtn>
                                </div>
                            </PathNode>

                            {/* Step 5: Result / Heuristic */}
                            <PathNode title="Execution Strategy" icon={Activity} isActive={currentStep === 5} isCompleted={currentStep === 5} isLast={true}>
                                
                                {/* Receipt Capture Area */}
                                <div ref={resultRef} className="bg-slate-950 w-full pt-1 pb-4 sm:pt-0">
                                    <div className="border border-slate-800 rounded-xl bg-slate-900/40 p-5 w-full font-mono relative overflow-hidden shadow-2xl shadow-emerald-900/5">
                                        
                                        <div className="mb-6 border-b border-slate-800 pb-4">
                                            <h2 className="text-slate-100 font-bold uppercase tracking-widest text-xs flex items-center gap-2 mb-1">
                                                <Zap size={12} className="text-emerald-400" /> ROUTING Engine Output
                                            </h2>
                                            <p className="text-slate-600 text-[10px]">{generationTime}</p>
                                        </div>
                                        
                                        <div className="space-y-3 mb-6 text-xs border-b border-slate-800 pb-6">
                                            <div className="flex justify-between items-start gap-4">
                                                <span className="text-slate-500 font-semibold">TARGET</span>
                                                <span className="text-emerald-400 text-right break-words max-w-[60%]">{decisionTarget}</span>
                                            </div>
                                            <div className="flex justify-between"><span className="text-slate-500">10_MIN_IMPACT</span><span className="text-slate-200">{l_10m}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-500">10_MO_IMPACT</span><span className="text-slate-200">{l_10mo}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-500">10_YR_IMPACT</span><span className="text-slate-200">{l_10yr}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-500">REVERSIBILITY</span><span className="text-slate-200">{l_door}</span></div>
                                        </div>

                                        {config && (
                                            <div>
                                                <div className="mb-5">
                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase ${config.bg} ${config.color} border ${config.border}`}>
                                                        {config.title}
                                                    </span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4 mb-5 text-xs">
                                                    <div><p className="text-slate-500 mb-1">TTL</p><p className="text-slate-200 text-sm">{config.ttl}</p></div>
                                                    <div><p className="text-slate-500 mb-1">MAX_OPTIONS</p><p className="text-slate-200 text-sm">{config.options}</p></div>
                                                </div>
                                                <div className="mb-5 text-xs">
                                                    <p className="text-slate-500 mb-1">ALGORITHM</p>
                                                    <p className="text-emerald-400 text-sm">{config.algorithm}</p>
                                                </div>
                                                <div className="text-xs">
                                                    <p className="text-slate-500 mb-1">EXECUTION_RULE</p>
                                                    <p className="text-slate-300 leading-relaxed font-sans">{config.rule}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Interactive Buttons */}
                                <div className="w-full space-y-3 mt-4">
                                    <div className="flex gap-3">
                                        <button onClick={handleDownloadImage} disabled={exportState.status === 'loading'} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 font-medium p-3 rounded-xl flex justify-center items-center gap-2 transition-colors border border-slate-700 disabled:opacity-50 text-sm">
                                            {exportState.type === 'download' && exportState.status === 'loading' ? <Activity size={16} className="animate-spin" /> : exportState.type === 'download' && exportState.status === 'success' ? <Check size={16} className="text-emerald-400" /> : <Download size={16} />}
                                            Save Image
                                        </button>
                                        <button onClick={handleCopyImage} disabled={exportState.status === 'loading'} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 font-medium p-3 rounded-xl flex justify-center items-center gap-2 transition-colors border border-slate-700 disabled:opacity-50 text-sm">
                                            {exportState.type === 'copy' && exportState.status === 'loading' ? <Activity size={16} className="animate-spin" /> : exportState.type === 'copy' && exportState.status === 'success' ? <Check size={16} className="text-emerald-400" /> : <Copy size={16} />}
                                            Copy Image
                                        </button>
                                    </div>
                                    
                                    {exportState.type === 'copy' && exportState.status === 'error' && (
                                        <p className="text-xs text-amber-500 text-center flex items-center justify-center gap-1 bg-amber-500/10 p-2 rounded-lg"><AlertTriangle size={12} /> Clipboard access denied. Try 'Save Image' instead.</p>
                                    )}

                                    <button onClick={() => resetFromStep(0)} className="w-full bg-slate-900 hover:bg-slate-800 text-slate-400 font-medium p-3 rounded-xl flex justify-center items-center gap-2 transition-colors text-sm">
                                        <RotateCcw size={14} /> Initialize New Query
                                    </button>
                                </div>
                            </PathNode>

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
